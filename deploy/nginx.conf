##
## Nginx config for backend.vehana.ai (Vehana v2 API)
##
## This MUST have WebSocket upgrade support — Ozonetel connects via wss:// to
## /api/v2/webhooks/{agent_id}/stream for every live call.
##
## Add to /etc/nginx/sites-available/vehana-v2 and symlink to sites-enabled/
##

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name backend.vehana.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name backend.vehana.ai;

    ssl_certificate     /etc/letsencrypt/live/backend.vehana.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.vehana.ai/privkey.pem;

    # ── Regular HTTP API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade — required for /api/v2/webhooks/{id}/stream
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Long timeouts for WebSocket calls (calls can last many minutes)
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }

    # ── Frontend static files (if served from same host) ─────────────────────
    location / {
        root   /var/www/vehana-frontend;
        try_files $uri $uri/ /index.html;
    }
}
